```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Products</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background:#e9e5df;
}

/* SECTION */
.products-section{
    padding:60px 20px;
    text-align:center;
}

/* TITLE */
.title{
    font-size:90px;
    font-weight:300;
    letter-spacing:12px;
    color:transparent;
    -webkit-text-stroke:1px #333;
    margin-bottom:60px;
    line-height:1.1;
}

/* CARDS */
.cards{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

/* CARD */
.card{
    position:relative;
    width:300px;
    height:420px;
    overflow:hidden;
    transform:rotate(-3deg);
    transition:0.4s ease;
    cursor:pointer;
}

/* IMAGE */
.card img{
    width:100%;
    height:100%;
    object-fit:cover;
   
    transition:0.4s;
}

/* TEXT OVERLAY */
.overlay{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:48px;
    letter-spacing:6px;
    font-weight:300;
}

/* HOVER */
.card:hover{
    transform:rotate(0deg) scale(1.05);
}

.card:hover img{
    filter:grayscale(0%);
}

/* RESPONSIVE */

/* TABLET */
@media(max-width:992px){
    .title{
        font-size:60px;
    }
}

/* MOBILE */
@media(max-width:600px){

    .title{
        font-size:40px;
        letter-spacing:6px;
    }

    .card{
        width:90%;
        height:350px;
        transform:rotate(0deg);
    }

    .overlay{
        font-size:32px;
    }
}
</style>

</head>

<body>

<section class="products-section">

    <h1 class="title">THE<br>PRODUCTS</h1>

    <div class="cards">

        <div class="card">
            <img src="orders/uploads/12.png" alt="">
        </div>

        <div class="card">
            <img src="https://i.imgur.com/2DsA49b.jpg" alt="">
            <div class="overlay">MERCH</div>
        </div>

        <div class="card">
            <img src="https://i.imgur.com/3ZQ3Z6Z.jpg" alt="">
            <div class="overlay">GAMES</div>
        </div>

    </div>

</section>

<script>
const cards = document.querySelectorAll('.card');

cards.forEach(card => {
    card.addEventListener('mousemove', (e) => {
        let rect = card.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;

        let rotateX = -(y - rect.height / 2) / 25;
        let rotateY = (x - rect.width / 2) / 25;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
    });

    card.addEventListener('mouseleave', () => {
        card.style.transform = 'rotate(0deg)';
    });
});
</script>

</body>
</html>
```
