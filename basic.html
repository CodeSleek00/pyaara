<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Hero</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}



/* VIDEO HERO */
.video-hero{
  position:relative;
  opacity: 0.9;
  width:100%;
  height:100vh;
  overflow:hidden;
  background-color: black;
}

/* Background Video */
.video-hero video{
  position:absolute;
  top:50%;
  left:50%;
  min-width:100%;
  min-height:100%;
  width:auto;
  height:auto;
  transform:translate(-50%, -50%);
  object-fit:cover;
}

/* Dark Overlay */
.video-hero::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4); /* adjust darkness */
}

/* Optional: subtle zoom animation */
.video-hero video{
  animation:zoom 20s infinite alternate ease-in-out;
}

@keyframes zoom{
  from{
    transform:translate(-50%, -50%) scale(1);
  }
  to{
    transform:translate(-50%, -50%) scale(1.1);
  }
}

/* RESPONSIVE FIX */
@media(max-width:768px){
  .video-hero{
    height:80vh;
  }
}

@media(max-width:480px){
  .video-hero{
    height:70vh;
  }
}
</style>
</head>

<body>

<section class="video-hero">
  <video autoplay muted loop playsinline>
    <source src="1.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>
</section>

</body>
</html>
